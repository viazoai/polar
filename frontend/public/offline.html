<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>오프라인 — Polar</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #fff;
        color: #1a1a1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 24px;
        text-align: center;
        gap: 16px;
      }
      .icon {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        background: #f4f4f4;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      h1 { font-size: 18px; font-weight: 600; }
      p { font-size: 14px; color: #888; line-height: 1.6; max-width: 280px; }
      button {
        margin-top: 8px;
        padding: 10px 24px;
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"
        fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>오프라인 상태입니다</h1>
    <p>인터넷 연결을 확인해주세요.<br/>이전에 열어본 순간은 계속 볼 수 있습니다.</p>
    <button onclick="window.location.reload()">다시 시도</button>
  </body>
</html>
